name: mirror
on:
  workflow_dispatch:
  schedule:
    - cron: '23 * * * *'
permissions:
  contents: write
concurrency:
  group: mirror
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync from Codeberg
        run: |
          git clone --mirror https://codeberg.org/artich0ke/sting.git src
          cd src
          git push --force \
            https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/b0lbas/sting.git \
            'refs/heads/*:refs/heads/*' 'refs/tags/*:refs/tags/*'
